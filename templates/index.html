<!DOCTYPE html>
<html>
<head>
    <title>Mood Journal</title>
</head>
<body>
    <h1>Mood Journal 🧠</h1>

    <form method="POST">
        <textarea name="text" placeholder="How are you feeling?" required></textarea>
        <br><br>
        <button type="submit">Analyze Mood</button>
    </form>

    {% if sentiment %}
        <h2>Your Mood: {{ sentiment }}</h2>
    {% endif %}
</body>
</html>
